    <div id="header">
        </div>

    <div id="main-content" class="auth-page">
        <div class="auth-container">
            <h2 class="main-title">THÀNH VIÊN SAKINA</h2>

            <div class="method-selector">
                <button class="method-btn active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                </button>
                <button class="method-btn" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> Đăng Ký
                </button>
            </div>

            <div id="login-form" class="recharge-card">
                <div class="card-header">Chào mừng bạn trở lại!</div>
                <form>
                    <input type="text" class="custom-input" placeholder="Tên đăng nhập" required>
                    <input type="password" class="custom-input" placeholder="Mật khẩu" required>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 13px;">
                        <label><input type="checkbox"> Ghi nhớ</label>
                        <a href="#" style="color: #ff4d4d; text-decoration: none;">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-primary">ĐĂNG NHẬP NGAY</button>
                </form>
            </div>

            <div id="register-form" class="recharge-card" style="display: none;">
                <div class="card-header">Tạo tài khoản mới</div>
                <form>
                    <input type="text" class="custom-input" placeholder="Tên tài khoản" required>
                    <input type="email" class="custom-input" placeholder="Email (ví dụ: abc@gmail.com)" required>
                    <input type="password" class="custom-input" placeholder="Mật khẩu" required>
                    <input type="password" class="custom-input" placeholder="Xác nhận mật khẩu" required>
                    
                    <button type="submit" class="btn-primary" style="background: #ff4d4d;">ĐĂNG KÝ TÀI KHOẢN</button>
                </form>
            </div>
        </div>
    </div>
<div class="fixed-widgets">
      <a href="https://www.facebook.com/otori.kushiro" target="_blank" class="widget-chat">
            <img src="img/logomess.jpg">
        </a>
        <button onclick="scrollToTop()" class="widget-top">
            <i class="arrow-up"></i>
        </button>
    </div>
